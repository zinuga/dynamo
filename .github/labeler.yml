# Configuration for actions/labeler
# Labels are applied to PRs based on changed files

# Backend labels
backend::vllm:
  - changed-files:
      - any-glob-to-any-file:
          - components/src/dynamo/vllm/**
          - container/Dockerfile.vllm
          - container/deps/requirements.vllm.txt
          - container/deps/vllm/**
          - examples/backends/vllm/**

backend::sglang:
  - changed-files:
      - any-glob-to-any-file:
          - components/src/dynamo/sglang/**
          - container/Dockerfile.sglang
          - examples/backends/sglang/**

backend::trtllm:
  - changed-files:
      - any-glob-to-any-file:
          - components/src/dynamo/trtllm/**
          - container/Dockerfile.trtllm
          - container/deps/trtllm/**
          - container/build_trtllm_wheel.sh
          - examples/backends/trtllm/**

# Component labels
router:
  - changed-files:
      - any-glob-to-any-file:
          - components/src/dynamo/router/**
          - lib/llm/src/kv_router/**

frontend:
  - changed-files:
      - any-glob-to-any-file:
          - components/src/dynamo/frontend/**
          - lib/llm/src/http/**
          - lib/llm/src/grpc/**
          - lib/llm/src/preprocessor/**
          - lib/llm/src/protocols/**
          - lib/llm/src/preprocessor.rs
          - lib/llm/src/tokenizers.rs

planner:
  - changed-files:
      - any-glob-to-any-file:
          - components/src/dynamo/planner/**
          - components/src/dynamo/profiler/**
          - components/src/dynamo/global_planner/**

# Deployment labels
deployment::k8s:
  - changed-files:
      - any-glob-to-any-file:
          - deploy/helm/**
          - deploy/operator/**

# Misc labels
container:
  - changed-files:
      - any-glob-to-any-file:
          - container/**

actions:
  - changed-files:
      - any-glob-to-any-file:
          - .github/workflows/**
          - .github/actions/**
          - .github/filters.yaml

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - docs/**
          - '**/*.md'
          - '**/*.rst'

xpu:
  - changed-files:
      - any-glob-to-any-file:
          - '**/xpu/**'
          - '**/*xpu*'

multimodal:
  - changed-files:
      - any-glob-to-any-file:
          - components/src/dynamo/common/memory/multimodal_embedding_cache_manager.py
          - components/src/dynamo/common/multimodal/**
          - components/src/dynamo/vllm/omni/**
          - components/src/dynamo/vllm/multimodal_handlers/**
          - components/src/dynamo/vllm/multimodal_utils/**
          - components/src/dynamo/sglang/init_multimodal.py
          - components/src/dynamo/sglang/request_handlers/multimodal/**
          - components/src/dynamo/trtllm/encode_helper.py
          - components/src/dynamo/trtllm/multimodal/**
          - components/src/dynamo/trtllm/multimodal_processor.py