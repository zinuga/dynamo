//
// Minimal Envoy external processing (ext_proc) v3 proto definitions.
// Covers only the messages and service required for KV-cache-aware routing.
// Reference: https://www.envoyproxy.io/docs/envoy/latest/api-v3/service/ext_proc/v3/external_processor.proto

syntax = "proto3";

package envoy.service.ext_proc.v3;

// ---------------------------------------------------------------------------
// External Processor service
// ---------------------------------------------------------------------------

service ExternalProcessor {
  // Envoy opens one bidirectional stream per HTTP request.
  // It sends ProcessingRequests (headers, body, trailers) in order and expects
  // ProcessingResponses that may mutate them.
  rpc Process(stream ProcessingRequest) returns (stream ProcessingResponse);
}

// ---------------------------------------------------------------------------
// Request messages (Envoy → ext_proc)
// ---------------------------------------------------------------------------

message ProcessingRequest {
  oneof request {
    HttpHeaders request_headers  = 2;
    HttpHeaders response_headers = 3;
    HttpBody    request_body     = 4;
    HttpBody    response_body    = 5;
    HttpTrailers request_trailers  = 6;
    HttpTrailers response_trailers = 7;
  }
}

message HttpHeaders {
  repeated HeaderValue headers   = 1;
  bool                 end_of_stream = 3;
}

message HttpBody {
  bytes body           = 1;
  bool  end_of_stream  = 2;
}

message HttpTrailers {
  repeated HeaderValue trailers = 1;
}

// ---------------------------------------------------------------------------
// Response messages (ext_proc → Envoy)
// ---------------------------------------------------------------------------

message ProcessingResponse {
  oneof response {
    HeadersResponse   request_headers    = 1;
    HeadersResponse   response_headers   = 2;
    BodyResponse      request_body       = 3;
    BodyResponse      response_body      = 4;
    TrailersResponse  request_trailers   = 5;
    TrailersResponse  response_trailers  = 6;
    ImmediateResponse immediate_response = 7;
  }
}

message HeadersResponse {
  CommonResponse response = 1;
}

message BodyResponse {
  CommonResponse response = 1;
}

message TrailersResponse {
  HeaderMutation header_mutation = 1;
}

// Common mutation payload returned in {Headers,Body}Response.
message CommonResponse {
  HeaderMutation header_mutation  = 1;
  BodyMutation   body_mutation    = 2;
  // Tell Envoy to re-evaluate routing (needed after setting destination header).
  bool           clear_route_cache = 4;
}

// Terminate the request immediately without forwarding it to the backend.
message ImmediateResponse {
  uint32         status  = 1;
  HeaderMutation headers = 2;
  bytes          body    = 3;
  string         details = 5;
}

// ---------------------------------------------------------------------------
// Header / body mutation helpers
// ---------------------------------------------------------------------------

message HeaderMutation {
  repeated HeaderValueOption set_headers    = 1;
  repeated string            remove_headers = 2;
}

message HeaderValueOption {
  HeaderValue header          = 1;
  bool        keep_empty_value = 2;
}

// A single header key-value pair.
// raw_value takes precedence when both fields are set; use it for binary-safe
// values. For routing headers (ASCII) either field works.
message HeaderValue {
  string key       = 1;
  string value     = 2;
  bytes  raw_value = 3;
}

message BodyMutation {
  oneof mutation {
    bytes body       = 1;
    bool  clear_body = 2;
  }
}
